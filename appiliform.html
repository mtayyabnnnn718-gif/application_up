<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Application Form</title>
    <link rel="stylesheet" href="style.css">
</head>
<style>
    *{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:linear-gradient(135deg,#0f172a,#2563eb,#7c3aed);
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    padding:20px;
}

.application-form{
    width:900px;
    max-width:100%;
    background:rgba(255,255,255,.1);
    backdrop-filter:blur(15px);
    padding:35px;
    border-radius:20px;
    color:#fff;
    box-shadow:0 10px 30px rgba(0,0,0,.3);
}

.application-form h2{
    text-align:center;
    margin-bottom:10px;
}

.application-form p{
    text-align:center;
    margin-bottom:25px;
}

.row{
    display:flex;
    gap:20px;
    margin-bottom:20px;
}

.input-box{
    flex:1;
    display:flex;
    flex-direction:column;
}

.input-box label{
    margin-bottom:8px;
}

.input-box input,
.input-box select,
.input-box textarea{
    padding:12px;
    border:none;
    border-radius:8px;
    outline:none;
}

textarea{
    resize:none;
}

button{
    width:100%;
    padding:15px;
    border:none;
    border-radius:8px;
    background:#2563eb;
    color:white;
    font-size:18px;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    background:#1d4ed8;
}

@media(max-width:768px){

    .row{
        flex-direction:column;
    }

}
</style>
<body>

<div class="container">
    <form class="application-form">

        <h2>Application Form</h2>
        <p>Please fill in your details.</p>

        <div class="row">

            <div class="input-box">
                <label>Full Name</label>
                <input type="text" required>
            </div>

            <div class="input-box">
                <label>Father Name</label>
                <input type="text" required>
            </div>

        </div>

        <div class="row">

            <div class="input-box">
                <label>Email</label>
                <input type="email" required>
            </div>

            <div class="input-box">
                <label>Phone</label>
                <input type="tel" required>
            </div>

        </div>

        <div class="row">

            <div class="input-box">
                <label>Date of Birth</label>
                <input type="date" required>
            </div>

            <div class="input-box">
                <label>Gender</label>

                <select required>
                    <option value="">Select Gender</option>
                    <option>Male</option>
                    <option>Female</option>
                    <option>Other</option>
                </select>

            </div>

        </div>

        <div class="input-box">
            <label>Address</label>
            <textarea rows="4"></textarea>
        </div>

        <div class="row">

            <div class="input-box">
                <label>Qualification</label>

                <select required>
                    <option value="">Select Qualification</option>
                    <option>Matric</option>
                    <option>Intermediate</option>
                    <option>Graduate</option>
                    <option>Master</option>
                </select>

            </div>

            <div class="input-box">
                <label>Upload CV</label>
                <input type="file">
            </div>

        </div>

        <div class="input-box">
            <label>Why do you want to join?</label>
            <textarea rows="4"></textarea>
        </div>

        <button type="submit">Submit Application</button>

    </form>
</div>

<script src="script.js"></script>
<script>
const form = document.querySelector(".application-form");

form.addEventListener("submit", function(e){

    e.preventDefault();

    alert("Application Submitted Successfully!");

    form.reset();

});
</script>

</body>
</html>
